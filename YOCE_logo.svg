<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Fondo transparente — funciona sobre oscuro y claro -->

  <g transform="translate(200, 200)">

    <!-- ANILLO GRECA — naranja metálico -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#e07820" stroke-width="34"/>

    <!-- Patrón greca escalonado — 12 posiciones -->
    <g fill="#ffffff">
      <g transform="rotate(0)">  <rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(30)"> <rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(60)"> <rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(90)"> <rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(120)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(150)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(180)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(210)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(240)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(270)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(300)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
      <g transform="rotate(330)"><rect x="-16" y="-166" width="13" height="18" rx="2"/><rect x="-4"  y="-158" width="13" height="10" rx="2"/><rect x="5"  y="-166" width="13" height="18" rx="2"/></g>
    </g>

    <!-- Borde interior -->
    <circle cx="0" cy="0" r="114" fill="transparent" stroke="#e07820" stroke-width="3.5"/>

    <!-- MEMBRANA CELULAR -->
    <circle cx="0" cy="0" r="100" fill="transparent" stroke="#00c49a" stroke-width="6.5"/>

    <!-- 6 RECEPTORES CAR -->
    <g transform="rotate(0)">
      <line x1="0" y1="-100" x2="0" y2="-116" stroke="#e07820" stroke-width="6" stroke-linecap="round"/>
      <rect x="-13" y="-142" width="12" height="26" rx="5"/>
      <rect x="1"   y="-142" width="12" height="26" rx="5"/>
      <rect x="-13" y="-142" width="12" height="26" rx="5" fill="#e07820"/>
      <rect x="1"   y="-142" width="12" height="26" rx="5" fill="#f5a243"/>
    </g>
    <g transform="rotate(60)">
      <line x1="0" y1="-100" x2="0" y2="-116" stroke="#e07820" stroke-width="6" stroke-linecap="round"/>
      <rect x="-13" y="-142" width="12" height="26" rx="5" fill="#e07820"/>
      <rect x="1"   y="-142" width="12" height="26" rx="5" fill="#f5a243"/>
    </g>
    <g transform="rotate(120)">
      <line x1="0" y1="-100" x2="0" y2="-116" stroke="#e07820" stroke-width="6" stroke-linecap="round"/>
      <rect x="-13" y="-142" width="12" height="26" rx="5" fill="#e07820"/>
      <rect x="1"   y="-142" width="12" height="26" rx="5" fill="#f5a243"/>
    </g>
    <g transform="rotate(180)">
      <line x1="0" y1="-100" x2="0" y2="-116" stroke="#e07820" stroke-width="6" stroke-linecap="round"/>
      <rect x="-13" y="-142" width="12" height="26" rx="5" fill="#e07820"/>
      <rect x="1"   y="-142" width="12" height="26" rx="5" fill="#f5a243"/>
    </g>
    <g transform="rotate(240)">
      <line x1="0" y1="-100" x2="0" y2="-116" stroke="#e07820" stroke-width="6" stroke-linecap="round"/>
      <rect x="-13" y="-142" width="12" height="26" rx="5" fill="#e07820"/>
      <rect x="1"   y="-142" width="12" height="26" rx="5" fill="#f5a243"/>
    </g>
    <g transform="rotate(300)">
      <line x1="0" y1="-100" x2="0" y2="-116" stroke="#e07820" stroke-width="6" stroke-linecap="round"/>
      <rect x="-13" y="-142" width="12" height="26" rx="5" fill="#e07820"/>
      <rect x="1"   y="-142" width="12" height="26" rx="5" fill="#f5a243"/>
    </g>

    <!-- NÚCLEO -->
    <circle cx="0" cy="0" r="34" fill="transparent" stroke="#e07820" stroke-width="5"/>
    <circle cx="0" cy="0" r="16" fill="#e07820"/>
    <circle cx="0" cy="0" r="6"  fill="#f5a243"/>

  </g>

</svg>
